info:
  name: Get Code Info for a Product
  type: http
  seq: 5

http:
  method: GET
  url: "{{fda_root_uri}}/search/codeinfo/{{product_id}}?signature={{$timestamp}}"
  params:
    - name: signature
      value: "{{$timestamp}}"
      type: query
  headers:
    - name: Authorization-User
      value: "{{FDA_AUTHORIZATION_USER}}"
    - name: Authorization-Key
      value: "{{FDA_AUTHORIZATION_KEY}}"
  auth: inherit

runtime:
  scripts:
    - type: tests
      code: |-
        function rowsFromResult(body) {
          if (Array.isArray(body.RESULT)) return body.RESULT;
          if (body.RESULT && Array.isArray(body.RESULT.COLUMNS) && Array.isArray(body.RESULT.DATA)) {
            const cols = body.RESULT.COLUMNS;
            return body.RESULT.DATA.map(function(row) {
              const obj = {};
              cols.forEach(function(col, idx) { obj[col] = row[idx]; });
              return obj;
            });
          }
          return [];
        }

        test("HTTP status is 200", function() {
          expect(res.status).to.equal(200);
        });

        test("STATUSCODE is 400 (FDA's success code)", function() {
          expect(res.body.STATUSCODE).to.equal(400);
        });

        test("MESSAGE is 'success'", function() {
          expect(res.body.MESSAGE).to.equal('success');
        });

        test("RESULTCOUNT is 1 and matches row count", function() {
          const rows = rowsFromResult(res.body);
          expect(res.body.RESULTCOUNT).to.equal(1);
          expect(rows.length).to.equal(1);
        });

        test("returned row matches the queried product_id", function() {
          const rows = rowsFromResult(res.body);
          const queriedProductId = bru.getEnvVar('product_id');
          const returnedId = rows[0].PRODUCTID || rows[0].productid;
          expect(String(returnedId)).to.equal(String(queriedProductId));
        });

        test("response has expected 2-column shape (productid, codeinformation)", function() {
          // Per iRES API Usage doc, /search/codeinfo/{productid} returns just 2 columns:
          // productid, codeinformation.
          const rows = rowsFromResult(res.body);
          const keys = Object.keys(rows[0]).map(function(k) { return k.toLowerCase(); });
          ['productid', 'codeinformation'].forEach(function(field) {
            expect(keys, `expected '${field}' missing from keys: ${keys.join(', ')}`).to.include(field);
          });
          // Validate the response really is just these two columns (no surprise extras).
          // Soft check via console.log rather than a hard assertion since FDA could add
          // columns over time.
          console.log("Total columns in response: " + keys.length);
          console.log("All keys: " + keys.join(', '));
        });

        test("CODEINFORMATION matches what get_event_products.yml returned", function() {
          // Cross-check: the same product (PRODUCTID 219875) returned a CODEINFORMATION
          // value via /recalls/eventproducts/{eventid}. This endpoint returning a
          // different value would suggest data inconsistency. Logging rather than
          // hard-asserting because we don't have cassette-stored ground truth here —
          // the human-eye comparison is good enough for this exploration.
          const rows = rowsFromResult(res.body);
          const codeinfo = rows[0].CODEINFORMATION || rows[0].codeinformation;
          console.log("CODEINFORMATION for product " + bru.getEnvVar('product_id') + ":");
          console.log(codeinfo);
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  Returns the code information (lot/serial/batch identifiers and expiration dates) for a
  given product. Just two columns: `productid` and `codeinformation`.

  This is the simplest endpoint in the iRES surface. Used as a sanity check that the
  CODEINFORMATION text for a given product is consistent across:
    - `/recalls/eventproducts/{eventid}` (CODEINFORMATION column in plural-event-product
      response)
    - `/search/codeinfo/{productid}` (this endpoint, point lookup)

  If the two return different values for the same product, that's a meaningful finding
  about FDA's internal consistency. Capture in api_observations.md.

  Notable detail: per the bulk POST endpoint docs, including `codeinformation` in the
  `displaycolumns` parameter caps the page size at 2,500 rows (vs. 5,000 normally).
  This isn't tested here (single-product lookup, no pagination) but informs the
  production extractor's `displaycolumns` choice — see api_observations.md.

  Test value source: `{{product_id}}` is 219875 (Alcon GenTeal Tears) seeded from the
  bulk POST exploration.

  All cross-cutting findings are consolidated in `documentation/fda/api_observations.md`.
