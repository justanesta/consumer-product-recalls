info:
  name: Get Product by ID
  type: http
  seq: 4

http:
  method: GET
  url: "{{fda_root_uri}}/recalls/product/{{product_id}}?signature={{$timestamp}}"
  params:
    - name: signature
      value: "{{$timestamp}}"
      type: query
  headers:
    - name: Authorization-User
      value: "{{FDA_AUTHORIZATION_USER}}"
    - name: Authorization-Key
      value: "{{FDA_AUTHORIZATION_KEY}}"
  auth: inherit

runtime:
  scripts:
    - type: tests
      code: |-
        function rowsFromResult(body) {
          if (Array.isArray(body.RESULT)) return body.RESULT;
          if (body.RESULT && Array.isArray(body.RESULT.COLUMNS) && Array.isArray(body.RESULT.DATA)) {
            const cols = body.RESULT.COLUMNS;
            return body.RESULT.DATA.map(function(row) {
              const obj = {};
              cols.forEach(function(col, idx) { obj[col] = row[idx]; });
              return obj;
            });
          }
          return [];
        }

        test("HTTP status is 200", function() {
          expect(res.status).to.equal(200);
        });

        test("STATUSCODE is 400 (FDA's success code)", function() {
          expect(res.body.STATUSCODE).to.equal(400);
        });

        test("MESSAGE is 'success'", function() {
          expect(res.body.MESSAGE).to.equal('success');
        });

        test("RESULTCOUNT is 1 and matches row count", function() {
          const rows = rowsFromResult(res.body);
          expect(res.body.RESULTCOUNT).to.equal(1);
          expect(rows.length).to.equal(1);
        });

        test("returned product matches the queried product_id", function() {
          const rows = rowsFromResult(res.body);
          const queriedProductId = bru.getEnvVar('product_id');
          const returnedId = rows[0].PRODUCTID || rows[0].productid;
          expect(String(returnedId)).to.equal(String(queriedProductId));
        });

        test("product has expected detail fields per PDF Implementation Notes", function() {
          // Per iRES API Usage doc, /recalls/product/{productid} returns ~18 columns:
          // productid, productdescriptiontxt, recalleventid, productshortreasontxt,
          // producttypeshort, recallnum, productdistributedquantity,
          // centerclassificationtypetxt, productdescriptionindicator,
          // productdescriptionshort, recallreasonindicator, recallreasonshort,
          // codeinfoindicator, enforcementreportdt, productlmd, determinationdt,
          // codeinformation, codeinfoshort.
          // Note: this endpoint returns `productlmd` (no dt suffix) — ADR 0007 references
          // productlmddt. Verify the column-name disagreement and update ADR if needed.
          const rows = rowsFromResult(res.body);
          const keys = Object.keys(rows[0]).map(function(k) { return k.toLowerCase(); });
          const requiredSubset = [
            'productid', 'recalleventid', 'productdescriptiontxt',
            'producttypeshort', 'recallnum', 'productlmd'
          ];
          requiredSubset.forEach(function(field) {
            expect(keys, `expected '${field}' missing from keys: ${keys.join(', ')}`).to.include(field);
          });
        });

        test("does PRODUCTLMD exist? (verifies ADR 0007 column-name claim)", function() {
          // ADR 0007 references the field as `productlmddt` (with dt suffix). The PDF
          // Implementation Notes for this endpoint says `productlmd` (no suffix). This
          // test logs whichever name the API actually uses so the bronze schema and
          // ADR 0007 can be reconciled.
          const rows = rowsFromResult(res.body);
          const keys = Object.keys(rows[0]);
          const lmdMatches = keys.filter(function(k) { return k.toLowerCase().indexOf('productlmd') !== -1; });
          console.log("Product-LMD-related keys: " + lmdMatches.join(', '));
          console.log("Sample value: " + (lmdMatches.length > 0 ? rows[0][lmdMatches[0]] : '(none)'));
        });

        test("log full product payload for inspection", function() {
          const rows = rowsFromResult(res.body);
          console.log("=== Product " + bru.getEnvVar('product_id') + " full payload ===");
          console.log(JSON.stringify(rows[0], null, 2));
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  Point lookup of a single product by product ID.

  Returns ~18 columns describing the product (description, recall reason, classification,
  code information, key dates) — a strict subset of `get_event_products.yml` minus the
  firm-anchor fields.

  Test value source: `{{product_id}}` is set in `environments/Development.yml` and seeded
  by `data_exploration/post_recalls_seed_event_ids.yml`. Initial value: 219875 (one of
  two products under Alcon Research LLC's event 98815).

  All cross-cutting findings are consolidated in `documentation/fda/api_observations.md`.
  Hypothesis from finding J: this endpoint returns columnar shape (it is a GET lookup).
  This file's tests will validate the hypothesis once again — no special-purpose shape
  detection because we expect columnar based on three prior confirmations.

  Specific ADR-0007 verification this request supports:
  -----------------------------------------------------
  ADR 0007 references the product-edit-timestamp column as `productlmddt` (with `dt`
  suffix). The PDF Implementation Notes for this endpoint document it as `productlmd`
  (no suffix). The "does PRODUCTLMD exist?" test logs whichever name the live API
  actually returns. Possible outcomes:

  - Returns `PRODUCTLMD` only → ADR 0007's reference is stale; update ADR to use the
    correct name (analogous to the `eventlmddt` / `EVENTLMD` discrepancy in finding H).
  - Returns `PRODUCTLMDDT` only → PDF is stale on the column name.
  - Returns both → unusual; document and pick one as canonical for the bronze schema.

  Update `documentation/fda/api_observations.md` with whichever outcome surfaces.
