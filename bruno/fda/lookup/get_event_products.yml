info:
  name: Get All Products for an Event
  type: http
  seq: 3

http:
  method: GET
  url: "{{fda_root_uri}}/recalls/eventproducts/{{event_id}}?signature={{$timestamp}}"
  params:
    - name: signature
      value: "{{$timestamp}}"
      type: query
  headers:
    - name: Authorization-User
      value: "{{FDA_AUTHORIZATION_USER}}"
    - name: Authorization-Key
      value: "{{FDA_AUTHORIZATION_KEY}}"
  auth: inherit

runtime:
  scripts:
    - type: tests
      code: |-
        // Helper: normalize either response shape (columnar vs object-array) into a
        // uniform array of row objects. See finding D in api_observations.md.
        function rowsFromResult(body) {
          if (Array.isArray(body.RESULT)) {
            return body.RESULT;  // object-array shape
          }
          if (body.RESULT && Array.isArray(body.RESULT.COLUMNS) && Array.isArray(body.RESULT.DATA)) {
            const cols = body.RESULT.COLUMNS;
            return body.RESULT.DATA.map(function(row) {
              const obj = {};
              cols.forEach(function(col, idx) { obj[col] = row[idx]; });
              return obj;
            });
          }
          return [];
        }

        function detectShape(body) {
          if (Array.isArray(body.RESULT)) return 'object-array';
          if (body.RESULT && Array.isArray(body.RESULT.COLUMNS)) return 'columnar';
          return 'unknown';
        }

        test("HTTP status is 200", function() {
          expect(res.status).to.equal(200);
        });

        test("STATUSCODE is 400 (FDA's success code)", function() {
          expect(res.body).to.have.property('STATUSCODE');
          expect(res.body.STATUSCODE).to.equal(400);
        });

        test("MESSAGE is 'success'", function() {
          expect(res.body.MESSAGE).to.equal('success');
        });

        test("response has standard envelope shape", function() {
          expect(res.body).to.have.property('MESSAGE');
          expect(res.body).to.have.property('STATUSCODE');
          expect(res.body).to.have.property('RESULTCOUNT');
          expect(res.body).to.have.property('RESULT');
        });

        test("response shape detection (columnar vs object-array)", function() {
          // Validates the hypothesis from api_observations.md: GET endpoints columnar,
          // POST bulk object-array. This is the first plural-row GET lookup, so it
          // also stress-tests the columnar parser with > 1 row.
          const shape = detectShape(res.body);
          console.log("Detected response shape: " + shape);
          if (shape === 'object-array') {
            console.log("RESULT.length: " + res.body.RESULT.length);
            if (res.body.RESULT.length > 0) {
              console.log("First row keys: " + Object.keys(res.body.RESULT[0]).join(', '));
            }
          } else if (shape === 'columnar') {
            console.log("COLUMNS: " + res.body.RESULT.COLUMNS.join(', '));
            console.log("DATA row count: " + res.body.RESULT.DATA.length);
          } else {
            console.log("Unknown RESULT structure: " + JSON.stringify(res.body.RESULT).substring(0, 300));
          }
        });

        test("RESULTCOUNT and row count agree (no pagination on lookup endpoints)", function() {
          // For lookup endpoints there is no pagination: RESULTCOUNT should equal the
          // number of rows actually returned. The bulk POST endpoint behaves differently
          // (RESULTCOUNT = total dataset size; see finding E in api_observations.md).
          const rows = rowsFromResult(res.body);
          expect(
            res.body.RESULTCOUNT,
            `RESULTCOUNT (${res.body.RESULTCOUNT}) should equal row count (${rows.length}) for lookup endpoints`
          ).to.equal(rows.length);
        });

        test("event has at least 2 products (seed event 98815 has 2 visible)", function() {
          // Event 98815 (Alcon Research LLC) had PRODUCTIDs 219875 and 219874 visible
          // from the seed-event-IDs request. There may be more products on the event
          // that weren't in the rows=5 seed window — assert >= 2 rather than == 2.
          const rows = rowsFromResult(res.body);
          expect(
            rows.length,
            `expected at least 2 products under event 98815, got ${rows.length}`
          ).to.be.at.least(2);
        });

        test("every row's RECALLEVENTID matches the queried event_id", function() {
          const rows = rowsFromResult(res.body);
          const queriedEventId = bru.getEnvVar('event_id');
          rows.forEach(function(row, i) {
            const returnedId = row.RECALLEVENTID || row.recalleventid;
            expect(
              String(returnedId),
              `row ${i + 1}: expected RECALLEVENTID '${returnedId}' to match queried event_id '${queriedEventId}'`
            ).to.equal(String(queriedEventId));
          });
        });

        test("PRODUCTIDs are unique within the response", function() {
          // Each product row should have a distinct PRODUCTID. Catches a class of bug
          // where the response accidentally contains duplicates (e.g., from a server-side
          // join gone wrong).
          const rows = rowsFromResult(res.body);
          const productIds = rows.map(function(row) { return row.PRODUCTID || row.productid; });
          const unique = new Set(productIds);
          expect(
            unique.size,
            `expected ${rows.length} unique PRODUCTIDs, got ${unique.size}: ${productIds.join(', ')}`
          ).to.equal(rows.length);
        });

        test("seeded product_id is among the returned products", function() {
          // The seed request picked PRODUCTID 219875 from event 98815. This endpoint
          // should return all products under 98815, so 219875 must appear.
          const rows = rowsFromResult(res.body);
          const queriedProductId = bru.getEnvVar('product_id');
          const productIds = rows.map(function(row) { return String(row.PRODUCTID || row.productid); });
          expect(
            productIds,
            `expected seeded product_id '${queriedProductId}' to appear in PRODUCTIDs: ${productIds.join(', ')}`
          ).to.include(String(queriedProductId));
        });

        test("rows have expected detail fields per PDF Implementation Notes", function() {
          // Per iRES API Usage doc, /recalls/eventproducts/{eventid} returns ~21 columns:
          // productid, productdescriptiontxt, recalleventid, productshortreasontxt,
          // producttypeshort, recallnum, productdistributedquantity,
          // centerclassificationtypetxt, productdescriptionindicator,
          // productdescriptionshort, recallreasonindicator, recallreasonshort,
          // codeinfoindicator, enforcementreportdt, determinationdt, firmfeinum,
          // firmsurvivingnam, firmsurvivingfei, firmlegalnam, codeinformation,
          // codeinfoshort.
          // Tests assert presence of a representative subset on every row.
          const rows = rowsFromResult(res.body);
          const requiredSubset = [
            'productid', 'recalleventid', 'productdescriptiontxt',
            'producttypeshort', 'firmlegalnam', 'recallreasonshort'
          ];
          rows.forEach(function(row, i) {
            const keys = Object.keys(row).map(function(k) { return k.toLowerCase(); });
            requiredSubset.forEach(function(field) {
              expect(
                keys,
                `row ${i + 1}: expected field '${field}' missing from keys: ${keys.join(', ')}`
              ).to.include(field);
            });
          });
        });

        test("log full response payload for inspection", function() {
          const rows = rowsFromResult(res.body);
          console.log("=== Products under event " + bru.getEnvVar('event_id') + " ===");
          console.log("Total products: " + rows.length);
          rows.forEach(function(row, i) {
            const productId = row.PRODUCTID || row.productid;
            const desc = row.PRODUCTDESCRIPTIONSHORT || row.productdescriptionshort || row.PRODUCTDESCRIPTIONTXT || row.productdescriptiontxt;
            const reason = row.RECALLREASONSHORT || row.recallreasonshort || row.PRODUCTSHORTREASONTXT || row.productshortreasontxt;
            console.log(`  product ${i + 1}: PRODUCTID=${productId}, desc=${desc}, reason=${reason}`);
          });
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  Plural lookup of all products under a given recall event.

  Returns ~21 columns per product row, covering product description, recall reason,
  classification, code information, and firm-anchor fields (FIRMFEINUM, FIRMLEGALNAM,
  FIRMSURVIVINGNAM, FIRMSURVIVINGFEI). This endpoint is the natural complement to
  `get_event_by_id.yml`: that one returns the event header (firm contact, phase, key
  dates); this one returns the line-level products under that event.

  Test value source: `{{event_id}}` is set in `environments/Development.yml` and seeded
  by `data_exploration/post_recalls_seed_event_ids.yml`. Initial value: 98815 (Alcon
  Research LLC, 2 products visible in the seed window).

  Notable quirks (signature cache-busting, header auth, STATUSCODE-as-success, base URL,
  uppercase column names) are documented canonically in
  `bruno/fda/lookup/get_product_types.yml`.

  Notable quirks for the bulk POST endpoint (object-array vs. columnar shape, RESULTCOUNT
  semantics, RID behavior, filter syntax) are documented in
  `bruno/fda/data_exploration/post_recalls_seed_event_ids.yml`.

  All cross-cutting findings are consolidated in `documentation/fda/api_observations.md`.

  This request validates two open hypotheses from api_observations.md:

  1. **Plural-row GET returns columnar** (extends finding J).
     The first two GET endpoints we hit (producttypes, event-by-id) returned columnar.
     POST /recalls/ returned object-array. The working hypothesis is that GET endpoints
     return columnar regardless of cardinality. This endpoint is the first GET that
     should return > 1 row (event 98815 has at least 2 products), so it validates the
     columnar parser handles plural responses correctly.

  2. **RESULTCOUNT semantics for lookup endpoints** (extends finding E).
     The bulk POST endpoint returns RESULTCOUNT = total matching dataset (independent
     of `rows`). For lookup endpoints there is no pagination — RESULTCOUNT should
     equal the number of rows returned. The "RESULTCOUNT and row count agree" test
     asserts this. If it fails, lookup-endpoint RESULTCOUNT semantics are surprising
     and api_observations.md needs an additional finding.

  After running, append observations to `documentation/fda/api_observations.md` if any
  new behavior surfaces (e.g., unexpected shape, surprise nullable field, count
  mismatch). Otherwise the existing findings stand and this request becomes the
  validation reference for plural-row GET behavior.
