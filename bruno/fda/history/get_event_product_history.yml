info:
  name: Get Event-Product Edit History
  type: http
  seq: 2

http:
  method: GET
  url: "{{fda_root_uri}}/search/eventproducthistory/{{edited_event_id}}?signature={{$timestamp}}"
  params:
    - name: signature
      value: "{{$timestamp}}"
      type: query
  headers:
    - name: Authorization-User
      value: "{{FDA_AUTHORIZATION_USER}}"
    - name: Authorization-Key
      value: "{{FDA_AUTHORIZATION_KEY}}"
  auth: inherit

runtime:
  scripts:
    - type: tests
      code: |-
        function rowsFromResult(body) {
          if (Array.isArray(body.RESULT)) return body.RESULT;
          if (body.RESULT && Array.isArray(body.RESULT.COLUMNS) && Array.isArray(body.RESULT.DATA)) {
            const cols = body.RESULT.COLUMNS;
            return body.RESULT.DATA.map(function(row) {
              const obj = {};
              cols.forEach(function(col, idx) { obj[col] = row[idx]; });
              return obj;
            });
          }
          return [];
        }

        test("HTTP status is 200", function() {
          expect(res.status).to.equal(200);
        });

        test("STATUSCODE is 400 (FDA's success code)", function() {
          expect(res.body.STATUSCODE).to.equal(400);
        });

        test("MESSAGE is 'success'", function() {
          expect(res.body.MESSAGE).to.equal('success');
        });

        test("RESULTCOUNT and row count agree (no pagination on lookup endpoints)", function() {
          const rows = rowsFromResult(res.body);
          expect(res.body.RESULTCOUNT).to.equal(rows.length);
        });

        test("history rows have expected schema (eventid, productid, fieldname, eventlmd, newvalue, oldvalue)", function() {
          // Per iRES API Usage doc, /search/eventproducthistory/{eventid} returns 6
          // columns: eventid, productid, fieldname, eventlmd, newvalue, oldvalue.
          // Note the timestamp column is `eventlmd` here (vs `productlmd` for the
          // product-history endpoint).
          const rows = rowsFromResult(res.body);
          if (rows.length === 0) {
            console.log("Event " + bru.getEnvVar('edited_event_id') + " has no edit history — heuristic miss.");
            console.log("Schema check skipped on empty result.");
            return;
          }
          const expected = ['eventid', 'productid', 'fieldname', 'eventlmd', 'newvalue', 'oldvalue'];
          const keys = Object.keys(rows[0]).map(function(k) { return k.toLowerCase(); });
          expected.forEach(function(field) {
            expect(keys, `expected '${field}' missing from history row keys: ${keys.join(', ')}`).to.include(field);
          });
        });

        test("every row's EVENTID matches the queried event (if any rows)", function() {
          const rows = rowsFromResult(res.body);
          const queriedEventId = bru.getEnvVar('edited_event_id');
          rows.forEach(function(row, i) {
            const returnedId = row.EVENTID || row.eventid;
            expect(
              String(returnedId),
              `row ${i + 1}: expected EVENTID '${returnedId}' to match queried event_id '${queriedEventId}'`
            ).to.equal(String(queriedEventId));
          });
        });

        test("FIELDNAME values are consistent (string, non-empty)", function() {
          const rows = rowsFromResult(res.body);
          rows.forEach(function(row, i) {
            const fieldname = row.FIELDNAME || row.fieldname;
            expect(fieldname, `row ${i + 1}: FIELDNAME should be a non-empty string`).to.be.a('string');
            expect(fieldname.length, `row ${i + 1}: FIELDNAME should be non-empty`).to.be.above(0);
          });
        });

        test("PRODUCTID may be null at event-level or scoped to specific products", function() {
          // The PDF lists `productid` in the column set but the endpoint is keyed by
          // event. Two possible behaviors:
          //   - PRODUCTID always populated (every history row is product-scoped)
          //   - PRODUCTID null for event-level edits (e.g., phasetxt change), populated
          //     only for product-scoped edits
          // This test logs the distribution rather than asserting, so we can document
          // whichever behavior the API exhibits.
          const rows = rowsFromResult(res.body);
          if (rows.length === 0) return;
          let nullCount = 0, populatedCount = 0;
          const distinctProductIds = new Set();
          rows.forEach(function(row) {
            const pid = row.PRODUCTID || row.productid;
            if (pid === null || pid === undefined || pid === '') {
              nullCount++;
            } else {
              populatedCount++;
              distinctProductIds.add(String(pid));
            }
          });
          console.log("PRODUCTID populated on " + populatedCount + " of " + rows.length + " rows; null on " + nullCount);
          console.log("Distinct PRODUCTIDs in history: " + Array.from(distinctProductIds).join(', '));
        });

        test("log full history payload + edited fields summary", function() {
          const rows = rowsFromResult(res.body);
          console.log("=== Event " + bru.getEnvVar('edited_event_id') + " edit history (" + rows.length + " rows) ===");
          if (rows.length === 0) {
            console.log("(no edits recorded)");
            return;
          }
          const fieldnames = new Set();
          let latestLmd = null;
          rows.forEach(function(row) {
            const fn = row.FIELDNAME || row.fieldname;
            if (fn) fieldnames.add(fn);
            const lmd = row.EVENTLMD || row.eventlmd;
            if (lmd && (!latestLmd || lmd > latestLmd)) latestLmd = lmd;
          });
          console.log("Distinct fields edited (" + fieldnames.size + "): " + Array.from(fieldnames).join(', '));
          console.log("Latest edit timestamp (EVENTLMD): " + latestLmd);
          console.log("Full rows:");
          console.log(JSON.stringify(rows, null, 2));
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  Field-level edit history for all products under a specific event. Six columns per row:
  `eventid`, `productid`, `fieldname`, `eventlmd`, `newvalue`, `oldvalue`. One row per
  individual field-level edit event since publication, scoped to the event.

  Companion to `get_product_history.yml`. The two endpoints differ in:

  | Aspect | `/search/producthistory/{productid}` | `/search/eventproducthistory/{eventid}` |
  |---|---|---|
  | Path param | productid | eventid |
  | Cardinality | one product's edits | all products under one event's edits |
  | Timestamp column | productlmd | eventlmd |

  Both feed the unified `recall_event_history` silver view per **ADR 0007**. The bronze
  schema should land event-product history in `fda_event_product_history_bronze`,
  separate from `fda_product_history_bronze` since the timestamp columns differ.

  Default test value: `{{edited_event_id}}` (98279, Karison Foods, Terminated). The
  terminated heuristic assumes phase transitions and recall lifecycle edits.

  To exercise the **empty case** for cassette-recording purposes, swap the URL path
  param from `{{edited_event_id}}` to `{{event_id}}` (the ongoing baseline 98815). The
  ongoing event may still have history (initial classification entries, etc.) so this
  is also a useful comparison case rather than a guaranteed empty.

  Open question this request answers (if it returns rows):
  --------------------------------------------------------
  Is `PRODUCTID` always populated on event-product-history rows? Two plausible behaviors:

  - PRODUCTID always populated → every history row is product-scoped, even for
    event-level edits like phase changes. This would mean event-level edits get one
    history row per product under the event.
  - PRODUCTID nullable → event-scope edits (e.g., `phasetxt` change) appear once with
    PRODUCTID null, while product-scope edits have a populated PRODUCTID.

  The `PRODUCTID may be null...` test logs the distribution; whichever the response
  shows, document in `api_observations.md`.

  All cross-cutting findings are consolidated in `documentation/fda/api_observations.md`.

  Implications for the bronze schema (Phase 5a):

  - Distinct table: `fda_event_product_history_bronze` keyed by
    `(eventid, productid, eventlmd, fieldname)` or by an internal sequence.
  - `oldvalue` and `newvalue` typed as text; downstream silver casts based on
    `fieldname`.
  - `eventlmd` is the watermark for incremental refresh.
  - Per ADR 0007, this table feeds the unified `recall_event_history` view directly.
