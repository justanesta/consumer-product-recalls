info:
  name: Search by Hazard
  type: http
  seq: 3

http:
  method: GET
  url: "{{cpsc_root_uri}}?format=json&Hazard={{hazard}}"
  params:
    - name: format
      value: json
      type: query
    - name: Hazard
      value: "{{hazard}}"
      type: query
  auth: inherit

runtime:
  scripts:
    - type: tests
      code: |-
        test("status is 200", function() {
          expect(res.status).to.equal(200);
        });

        test("record count", function() {
          console.log("record count: " + res.body.length);
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  Hazard text filter using the Hazard parameter.

  Observed behavior (confirmed 2026-04-24):
  - Hazard IS a valid parameter name (confirmed by v1.4 programmer's guide, September 2018).
    The guide gives this example: ?RecallTitle=stroller&Hazard=pinch. An invalid parameter
    name would cause the API to return ALL records (~9,700+); Hazard=fire and Hazard=Collapse
    both returned 0, confirming the parameter is recognized but matches nothing.
  - Root cause: Hazard= likely searches Hazards[].HazardType, not Hazards[].Name.
    HazardType is "" (empty string) on every record sampled — the field appears unpopulated
    in the current API version. Any non-empty Hazard query will therefore return 0 results.
  - Hazards[].Name contains the actual human-readable hazard description and is not
    searchable via this parameter. HazardTypeID is also consistently "".
  - Do NOT use Hazard= for ETL filtering or data exploration. Use date-range parameters
    and post-filter on Hazards[].Name in application code instead.
  - Re-validate once bronze data confirms whether HazardType is ever populated (see TODO.md).
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
