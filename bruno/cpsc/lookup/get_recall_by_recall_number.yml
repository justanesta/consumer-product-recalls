info:
  name: Get Recall by RecallNumber
  type: http
  seq: 1

http:
  method: GET
  url: "{{cpsc_root_uri}}?format=json&RecallNumber={{recall_number}}"
  params:
    - name: format
      value: json
      type: query
    - name: RecallNumber
      value: "{{recall_number}}"
      type: query
  auth: inherit

runtime:
  scripts:
    - type: tests
      code: |-
        test("status is 200", function() {
          expect(res.status).to.equal(200);
        });

        test("record count", function() {
          console.log("record count: " + res.body.length);
        });

        test("response is an array with exactly 1 record", function() {
          expect(res.body).to.be.an('array');
          expect(res.body.length).to.equal(1);
        });

        test("record has required top-level fields", function() {
          const requiredFields = [
            'RecallID', 'RecallNumber', 'RecallDate', 'LastPublishDate',
            'Title', 'Description', 'URL', 'ConsumerContact',
            'Products', 'Images', 'Injuries',
            'Manufacturers', 'Retailers', 'Importers', 'Distributors',
            'Inconjunctions',
            'ManufacturerCountries', 'ProductUPCs',
            'Hazards', 'Remedies', 'RemedyOptions'
          ];
          const record = res.body[0];
          requiredFields.forEach(function(field) {
            expect(record, `missing field: ${field}`).to.have.property(field);
          });
        });

        test("returned record contains the queried recall number", function() {
          const queried = bru.getEnvVar('recall_number');
          const record = res.body[0];
          expect(
            record.RecallNumber,
            `expected RecallNumber to contain ${queried}, got ${record.RecallNumber}`
          ).to.include(queried);
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  Point lookup by RecallNumber (the human-readable identifier, e.g. "26435").

  Observed behavior (confirmed 2026-04-24):
  - Filter is substring/contains, not exact match. "26435" returned 1 record because no
    other RecallNumber in the database contains "26435" as a substring — not because the
    API does exact matching. Verified empirically by probe_recall_number_wildcard.yml:
    "264" returned ~43 records spanning 2005–2026.
  - Response is always an array (even for 1 result); test for length, not a bare object.
  - Response size scales with match count (~1.2KB for 1 record, ~42KB for 43 records).
    No server-side pagination — all matches return in one response.
  - No server-side caching: pragma=no-cache. Server: Microsoft-IIS/10.0 / ASP.NET 4.0.30319.

  Use this for: verifying a specific recall exists, debugging by known RecallNumber,
  or populating detail views. Use a full 5+ digit RecallNumber to minimize false matches.
