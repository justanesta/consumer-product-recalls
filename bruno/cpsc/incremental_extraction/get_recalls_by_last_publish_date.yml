info:
  name: Get CPSC Recalls by Last Publish Date
  type: http
  seq: 1

http:
  method: GET
  url: "{{cpsc_root_uri}}?format=json&LastPublishDateStart={{last_publish_date_start}}"
  params:
    - name: format
      value: json
      type: query
    - name: LastPublishDateStart
      value: "{{last_publish_date_start}}"
      type: query
  auth: inherit

runtime:
  scripts:
    - type: tests
      code: |-
        test("status is 200", function() {
          expect(res.status).to.equal(200);
        });

        test("record count", function() {
          console.log("record count: " + res.body.length);
        });

        test("response is a non-empty array", function() {
          expect(res.body).to.be.an('array');
          expect(res.body.length).to.be.greaterThan(0);
        });

        test("all records have required top-level fields", function() {
          const requiredFields = [
            'RecallID', 'RecallNumber', 'RecallDate', 'LastPublishDate',
            'Title', 'Description', 'URL', 'ConsumerContact',
            'Products', 'Images', 'Injuries',
            'Manufacturers', 'Retailers', 'Importers', 'Distributors',
            'Inconjunctions',
            'ManufacturerCountries', 'ProductUPCs',
            'Hazards', 'Remedies', 'RemedyOptions'
          ];
          res.body.forEach(function(record) {
            requiredFields.forEach(function(field) {
              expect(record, `record ${record.RecallNumber} missing field: ${field}`).to.have.property(field);
            });
          });
        });

        test("all records have LastPublishDate on or after the start date", function() {
          const startDate = new Date(bru.getEnvVar('last_publish_date_start'));
          res.body.forEach(function(record) {
            const publishDate = new Date(record.LastPublishDate);
            expect(
              publishDate.getTime(),
              `RecallNumber ${record.RecallNumber} has LastPublishDate ${record.LastPublishDate} before start ${bru.getEnvVar('last_publish_date_start')}`
            ).to.be.at.least(startDate.getTime());
          });
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  Primary extraction request — matches CpscExtractor.extract() in src/extractors/cpsc.py.

  Uses LastPublishDate (not RecallDate) as the incremental cursor per ADR 0010. The watermark is read from source_watermarks and advanced transactionally on each load.

  Known gotcha: field alias in JSON response is "Inconjunctions" (lowercase 'c'), not "InConjunctions". Discovered during cassette recording; wrong casing caused schema validation failures in the Pydantic model.

  No auth required. No pagination — one GET returns all matching records.
  Response size can be large for wide date windows.
