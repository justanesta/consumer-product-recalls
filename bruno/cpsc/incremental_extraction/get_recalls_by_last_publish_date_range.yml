info:
  name: Get CPSC Recalls by Last Publish Date Range
  type: http
  seq: 2

http:
  method: GET
  url: "{{cpsc_root_uri}}?format=json&LastPublishDateStart={{last_publish_date_start}}&LastPublishDateEnd={{last_publish_date_end}}"
  params:
    - name: format
      value: json
      type: query
    - name: LastPublishDateStart
      value: "{{last_publish_date_start}}"
      type: query
    - name: LastPublishDateEnd
      value: "{{last_publish_date_end}}"
      type: query
  auth: inherit

runtime:
  scripts:
    - type: tests
      code: |-
        test("status is 200", function() {
          expect(res.status).to.equal(200);
        });

        test("record count", function() {
          console.log("record count: " + res.body.length);
        });

        test("response is an array", function() {
          expect(res.body).to.be.an('array');
        });

        test("all records have required top-level fields", function() {
          const requiredFields = [
            'RecallID', 'RecallNumber', 'RecallDate', 'LastPublishDate',
            'Title', 'Description', 'URL', 'ConsumerContact',
            'Products', 'Images', 'Injuries',
            'Manufacturers', 'Retailers', 'Importers', 'Distributors',
            'Inconjunctions',
            'ManufacturerCountries', 'ProductUPCs',
            'Hazards', 'Remedies', 'RemedyOptions'
          ];
          res.body.forEach(function(record) {
            requiredFields.forEach(function(field) {
              expect(record, `record ${record.RecallNumber} missing field: ${field}`).to.have.property(field);
            });
          });
        });

        test("all records have LastPublishDate within the requested window (both bounds inclusive)", function() {
          const start = bru.getEnvVar('last_publish_date_start');
          const end = bru.getEnvVar('last_publish_date_end');
          res.body.forEach(function(record) {
            const publishDate = record.LastPublishDate.substring(0, 10);
            expect(
              publishDate >= start,
              `RecallNumber ${record.RecallNumber} has LastPublishDate ${publishDate} before start ${start}`
            ).to.be.true;
            expect(
              publishDate <= end,
              `RecallNumber ${record.RecallNumber} has LastPublishDate ${publishDate} after end ${end}`
            ).to.be.true;
          });
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  Bounded window query using both LastPublishDateStart and LastPublishDateEnd.
  Useful for targeted data exploration and verifying the watermark logic against a known date range.

  Observed behavior (confirmed 2026-04-24):
  - Both bounds are inclusive: records with LastPublishDate exactly equal to the start or end date are returned.
  - Old recalls surface when their LastPublishDate is updated (e.g. a 2001 recall appeared with
    LastPublishDate 2026-04-16, meaning CPSC re-published it). Incremental loads will pick these up.
  - No server-side caching: pragma=no-cache, expires=date. Every request hits origin.
  - Server: Microsoft-IIS/10.0 / ASP.NET 4.0.30319.

  Differs from get_recalls_by_last_publish_date.yml (open-ended, no end date) which matches what
  CpscExtractor.extract() sends in production. This request is for exploration and verification only.

  An empty response is valid if no recalls were published in the given window.
