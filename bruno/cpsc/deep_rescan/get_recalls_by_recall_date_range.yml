info:
  name: Get CPSC Recalls by Recall Date Range
  type: http
  seq: 2

http:
  method: GET
  url: "{{cpsc_root_uri}}?format=json&RecallDateStart={{recall_date_start}}&RecallDateEnd={{recall_date_end}}"
  params:
    - name: format
      value: json
      type: query
    - name: RecallDateStart
      value: "{{recall_date_start}}"
      type: query
    - name: RecallDateEnd
      value: "{{recall_date_end}}"
      type: query
  auth: inherit

runtime:
  scripts:
    - type: tests
      code: |-
        test("status is 200", function() {
          expect(res.status).to.equal(200);
        });

        test("record count", function() {
          console.log("record count: " + res.body.length);
        });

        test("response is a non-empty array", function() {
          expect(res.body).to.be.an('array');
          expect(res.body.length).to.be.greaterThan(0);
        });

        test("all records have required top-level fields", function() {
          const requiredFields = [
            'RecallID', 'RecallNumber', 'RecallDate', 'LastPublishDate',
            'Title', 'Description', 'URL', 'ConsumerContact',
            'Products', 'Images', 'Injuries',
            'Manufacturers', 'Retailers', 'Importers', 'Distributors',
            'Inconjunctions',
            'ManufacturerCountries', 'ProductUPCs',
            'Hazards', 'Remedies', 'RemedyOptions'
          ];
          res.body.forEach(function(record) {
            requiredFields.forEach(function(field) {
              expect(record, `record ${record.RecallNumber} missing field: ${field}`).to.have.property(field);
            });
          });
        });

        test("all records have RecallDate within the requested range (inclusive)", function() {
          const start = bru.getEnvVar('recall_date_start');
          const end = bru.getEnvVar('recall_date_end');
          res.body.forEach(function(record) {
            const recallDate = record.RecallDate.substring(0, 10);
            expect(
              recallDate >= start,
              `RecallNumber ${record.RecallNumber} has RecallDate ${recallDate} before start ${start}`
            ).to.be.true;
            expect(
              recallDate <= end,
              `RecallNumber ${record.RecallNumber} has RecallDate ${recallDate} after end ${end}`
            ).to.be.true;
          });
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  Bounded query returning all recalls with RecallDate between RecallDateStart and RecallDateEnd (both inclusive).

  Observed behavior (confirmed 2026-04-24, RecallDateStart=2026-04-16, RecallDateEnd=2026-04-24):
  - Both bounds are inclusive. All returned RecallDates fell on 2026-04-16 or 2026-04-23; none
    exceeded the end bound of 2026-04-24.
  - Content-length (28576) was identical to the open-ended get_recalls_by_recall_date query run
    on the same date. Adding RecallDateEnd=2026-04-24 added no constraint because no recalls
    with RecallDate after 2026-04-24 existed in the DB at query time (today is 2026-04-24).
  - Date comparison: RecallDate uses format YYYY-MM-DDTHH:MM:SS with no timezone suffix.
    String comparison on substring(0, 10) is safe and avoids timezone edge cases.
  - No server-side caching: pragma=no-cache. Server: Microsoft-IIS/10.0 / ASP.NET 4.0.30319.

  ETL use cases:
  - Full historical load: chunk into fixed RecallDate windows (e.g. year-by-year from 1973)
    to avoid timeouts and memory pressure on large ranges.
  - Targeted backfill: re-process a specific historical window without noise from
    re-published old recalls (which would appear in a LastPublishDate query, not here).
  - Do NOT use for ongoing incremental loads — RecallDate never changes, so amended recalls
    will not surface here. Use LastPublishDate queries for incremental extraction.
