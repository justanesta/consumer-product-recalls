[alembic]
# Path to migration scripts, relative to this file (repo root).
script_location = migrations

prepend_sys_path = .

# sqlalchemy.url is intentionally left empty.
# The database URL is injected in migrations/env.py from the NEON_DATABASE_URL
# environment variable — never hardcode credentials here.
sqlalchemy.url =

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
