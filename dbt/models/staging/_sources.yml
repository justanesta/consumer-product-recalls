version: 2

sources:
  - name: cpsc
    description: Bronze layer for CPSC (Consumer Product Safety Commission) recalls, loaded by src.extractors.cpsc.CpscExtractor.
    schema: public
    tables:
      - name: cpsc_recalls_bronze
        description: One row per (source_recall_id, content_hash) landed from the CPSC Recall Retrieval Web Services API.
        loaded_at_field: extraction_timestamp
        freshness:
          warn_after: {count: 48, period: hour}
          error_after: {count: 7, period: day}
        columns:
          - name: source_recall_id
            description: CPSC RecallNumber — stable identifier across republications.
            tests:
              - not_null
          - name: content_hash
            description: SHA-256 of canonicalized record payload (ADR 0007). Dedup key.
            tests:
              - not_null
          - name: extraction_timestamp
            description: When the extractor wrote this row.
            tests:
              - not_null
      - name: cpsc_recalls_rejected
        description: Quarantine table for records that failed validation or invariant checks (ADR 0013).
        loaded_at_field: rejected_at

  - name: fda
    description: Bronze layer for FDA iRES enforcement recalls, loaded by src.extractors.fda.FdaExtractor.
    schema: public
    tables:
      - name: fda_recalls_bronze
        description: >
          One row per (source_recall_id, content_hash) landed from the FDA iRES bulk POST API.
          source_recall_id = PRODUCTID (product-level key); recall_event_id = RECALLEVENTID
          (event-level grouping key). Multiple rows per source_recall_id are expected when
          content changes between extraction runs (edit detection per ADR 0007).
        loaded_at_field: extraction_timestamp
        freshness:
          warn_after: {count: 72, period: hour}  # FDA publishes Mon-Fri; 72h covers weekends
          error_after: {count: 7, period: day}
        columns:
          - name: source_recall_id
            description: FDA PRODUCTID — unique product identifier across all FDA recall events.
            tests:
              - not_null
          - name: content_hash
            description: SHA-256 of canonicalized record payload (ADR 0007). Dedup key.
            tests:
              - not_null
          - name: extraction_timestamp
            description: When the extractor wrote this row.
            tests:
              - not_null
      - name: fda_recalls_rejected
        description: Quarantine table for FDA records that failed validation or invariant checks (ADR 0013).
        loaded_at_field: rejected_at

  - name: usda
    description: Bronze layer for USDA FSIS recalls, loaded by src.extractors.usda.UsdaExtractor.
    schema: public
    tables:
      - name: usda_fsis_recalls_bronze
        description: >
          One row per (source_recall_id, content_hash, langcode) landed from the USDA FSIS
          public recall API. Bilingual: English and Spanish siblings co-exist in bronze
          (langcode column distinguishes). Silver consumes only English (stg_usda_fsis_recalls
          filters langcode='English').
        loaded_at_field: extraction_timestamp
        freshness:
          # USDA recalls publish ad-hoc, averaging ~1/week (per
          # documentation/usda/first_extraction_findings.md sections B-C: 115
          # weekday gaps in 6 months, "one recall at a time"). Multi-week
          # silences are not abnormal; SLA flags pipeline failure, not source
          # quietness.
          warn_after: {count: 14, period: day}
          error_after: {count: 30, period: day}
        columns:
          - name: source_recall_id
            description: USDA field_recall_number — stable identifier across republications.
            tests:
              - not_null
          - name: content_hash
            description: SHA-256 of canonicalized record payload (ADR 0007). Dedup key.
            tests:
              - not_null
          - name: extraction_timestamp
            description: When the extractor wrote this row.
            tests:
              - not_null
          - name: langcode
            description: "'English' or 'Spanish' — bilingual sibling marker (ADR 0006)."
            tests:
              - not_null
              - accepted_values:
                  arguments:
                    values: ['English', 'Spanish']
      - name: usda_fsis_recalls_rejected
        description: Quarantine table for USDA records that failed validation or invariant checks (ADR 0013).
        loaded_at_field: rejected_at

  - name: usda_establishments
    description: Bronze layer for USDA FSIS Establishment Listing API, loaded by src.extractors.usda_establishment.UsdaEstablishmentExtractor.
    schema: public
    tables:
      - name: usda_fsis_establishments_bronze
        description: >
          One row per (source_recall_id, content_hash) landed from the USDA FSIS
          Establishment Listing API. source_recall_id reuses the bronze identity
          column convention but holds the FSIS establishment record id, not a
          recall id. Per-establishment demographic + geolocation snapshot;
          weekly Mon/Tue source cadence (full dump every run, no incremental
          filter — see documentation/usda/establishment_api_observations.md).
        loaded_at_field: extraction_timestamp
        freshness:
          # Establishment API publishes weekly Mon/Tue; 14d covers a missed week
          # plus weekend, 30d flags a real outage. Mirrors usda recalls SLA.
          warn_after: {count: 14, period: day}
          error_after: {count: 30, period: day}
        columns:
          - name: source_recall_id
            description: FSIS establishment record id (column name follows the bronze identity convention).
            tests:
              - not_null
          - name: content_hash
            description: SHA-256 of canonicalized record payload (ADR 0007). Dedup key.
            tests:
              - not_null
          - name: extraction_timestamp
            description: When the extractor wrote this row.
            tests:
              - not_null
      - name: usda_fsis_establishments_rejected
        description: Quarantine table for FSIS establishment records that failed validation or invariant checks (ADR 0013).
        loaded_at_field: rejected_at
