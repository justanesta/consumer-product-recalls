consumer_product_recalls:
  target: dev
  outputs:
    dev:
      type: postgres
      # dbt-postgres requires individual connection fields; cannot accept a raw DSN.
      # Set NEON_HOST, NEON_USER, NEON_PASSWORD, NEON_DBNAME in .env (see .env.example).
      host: "{{ env_var('NEON_HOST') }}"
      user: "{{ env_var('NEON_USER') }}"
      password: "{{ env_var('NEON_PASSWORD') }}"
      port: 5432
      dbname: "{{ env_var('NEON_DBNAME') }}"
      schema: public
      sslmode: require
      connect_timeout: 10
      threads: 4
